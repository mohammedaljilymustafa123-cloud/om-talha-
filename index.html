<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة السودان الذكية</title>
    <style>
        :root {
            --bg-dark: #1a1f3c; --bg-light: #f4f7fd; --accent-orange: #ff5f40; --text-main: #2d3436;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-light); margin: 0; overflow-x: hidden; }
        .header { background-color: var(--bg-dark); color: white; padding: 30px 20px 60px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; text-align: center; position: relative; }
        .menu-btn { position: absolute; top: 25px; right: 20px; font-size: 24px; cursor: pointer; color: white; }
        .side-menu { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); z-index: 1000; transition: 0.3s; padding: 20px; box-sizing: border-box; }
        .side-menu.active { right: 0; }
        .stat-box { background: #f8f9ff; padding: 10px; border-radius: 12px; margin-bottom: 8px; text-align: center; border: 1px solid #e0e4f5; }
        .stat-num { color: var(--accent-orange); font-size: 18px; font-weight: bold; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
        .visitor-counter { position: absolute; top: 25px; left: 20px; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; font-size: 13px; }
        .profile-img { width: 85px; height: 85px; border-radius: 25px; border: 3px solid rgba(255,255,255,0.2); object-fit: cover; cursor: pointer; }
        .container { max-width: 500px; margin: -35px auto 20px; padding: 0 15px; position: relative; z-index: 10; }
        .search-card { background: white; padding: 20px; border-radius: 30px; box-shadow: var(--card-shadow); margin-bottom: 20px; }
        .search-input { width: 100%; padding: 15px; border-radius: 18px; border: none; background: #f0f2f8; outline: none; }
        
        /* تنسيق الجدول الجديد */
        .styled-table { width: 100%; border-collapse: collapse; background: white; border-radius: 20px; overflow: hidden; font-size: 12px; table-layout: fixed; }
        .styled-table th { background: var(--bg-dark); color: white; padding: 12px 5px; }
        .styled-table td { padding: 12px 5px; border-bottom: 1px solid #eee; text-align: center; word-wrap: break-word; }
        .missing { color: #ff4757; font-weight: bold; font-size: 10px; }
        
        #adminPanel { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:2000; padding:20px; box-sizing:border-box; overflow-y:auto; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="header">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="visitor-counter">👁️ <span id="visitorCount">0</span></div>
    <img src="1000026303.jpg" class="profile-img" onclick="handleAdminAccess()">
    <h2 style="margin: 10px 0 5px; font-size: 20px;">سفير القوافي</h2>
    <p style="margin: 0; font-size: 13px; opacity: 0.8;">منصة الاستعلام الذكية - السودان</p>
</div>

<div class="side-menu" id="sideMenu">
    <h3>📊 الإحصائيات</h3>
    <div class="stat-box">السيارات: <span class="stat-num" id="totalCars">0</span></div>
    <div class="stat-box">البحث: <span class="stat-num" id="totalSearch">0</span></div>
    <hr>
    <input type="text" id="userPhone" placeholder="سجل رقمك للمراسلة" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd;">
    <button onclick="saveUserPhone()" style="width:100%; margin-top:5px; background:var(--bg-dark); color:white; border:none; padding:10px; border-radius:10px;">حفظ</button>
</div>

<div class="container">
    <div id="adminPanel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <b>🛠️ لوحة التحكم</b>
            <button onclick="document.getElementById('adminPanel').style.display='none'" style="background:red; color:white; border:none; padding:5px 10px; border-radius:8px;">إغلاق</button>
        </div>
        <textarea id="bulkInput" style="width:100%; height:120px; padding:10px; border-radius:10px;" placeholder="اكسنت 123456 خ789"></textarea>
        <button onclick="addBulkCars()" style="width:100%; background:var(--accent-orange); color:white; border:none; padding:12px; border-radius:15px; margin-top:10px;">🚀 نشر</button>
        <button onclick="if(confirm('حذف الكل؟')){cars=[]; localStorage.setItem('cars', JSON.stringify(cars)); render();}" style="width:100%; background:#333; color:white; border:none; padding:10px; border-radius:15px; margin-top:10px;">🗑️ مسح جميع البيانات</button>
    </div>

    <div class="search-card">
        <input type="text" id="search" class="search-input" oninput="doSearch()" placeholder="🔍 ابحث عن شاسيه، سيارة، أو لوحة...">
    </div>

    <div id="carsList"></div>
</div>

<script>
    let cars = JSON.parse(localStorage.getItem('cars')) || [];
    let stats = JSON.parse(localStorage.getItem('siteStats')) || { search: 0, clicks: 0 };
    let clickCount = 0;
    let currentLimit = 10;

    function handleAdminAccess() {
        clickCount++;
        if(clickCount === 3) {
            if(prompt("كلمة السر") === "3344") document.getElementById('adminPanel').style.display = 'block';
            clickCount = 0;
        }
        setTimeout(() => clickCount = 0, 1500);
    }

    function render(data = cars) {
        const list = document.getElementById('carsList');
        if(data.length === 0) {
            list.innerHTML = `<div style="text-align:center; padding:30px; background:white; border-radius:20px;">🔍 لا توجد نتائج</div>`;
            return;
        }

        const displayData = data.slice(0, currentLimit);
        let html = `<table class="styled-table"><thead><tr><th>المركبة</th><th>الشاسيه</th><th>اللوحة</th><th>💬</th></tr></thead><tbody>`;
        
        html += displayData.map(c => `
            <tr>
                <td>${c.name || '<span class="missing">لا يوجد</span>'}</td>
                <td>${c.id || '<span class="missing">لا يوجد</span>'}</td>
                <td>${c.plate || '<span class="missing">لا يوجد</span>'}</td>
                <td onclick="window.open('https://wa.me/${c.phone || '249129642174'}')" style="cursor:pointer; font-size:18px;">💬</td>
            </tr>
        `).join('');

        html += `</tbody></table>`;
        if(data.length > currentLimit) {
            html += `<button onclick="currentLimit+=10; render()" style="width:100%; margin-top:10px; padding:10px; border-radius:10px; border:none; background:#ff5f40; color:white;">عرض المزيد (${data.length - currentLimit})</button>`;
        }
        list.innerHTML = html;
        document.getElementById('totalCars').innerText = cars.length;
    }

    function addBulkCars() {
        const input = document.getElementById('bulkInput').value.trim();
        if(!input) return;
        input.split('\n').forEach(line => {
            const p = line.split(/\s+/);
            if(p.length > 0) cars.unshift({name: p[0], id: p[1] || "", plate: p[2] || "", phone: "249129642174"});
        });
        localStorage.setItem('cars', JSON.stringify(cars));
        document.getElementById('bulkInput').value = "";
        render();
        alert("تم النشر بنجاح");
    }

    function doSearch() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = cars.filter(c => (c.id+c.name+c.plate).toLowerCase().includes(q));
        currentLimit = 10;
        render(filtered);
    }

    function toggleMenu() {
        document.getElementById('sideMenu').classList.toggle('active');
        document.getElementById('overlay').style.display = document.getElementById('sideMenu').classList.contains('active') ? 'block' : 'none';
    }

    function saveUserPhone() {
        localStorage.setItem('registeredPhone', document.getElementById('userPhone').value);
        alert("تم الحفظ");
    }

    // عداد زوار بسيط
    let v = parseInt(localStorage.getItem('visitorCount') || 1240) + 1;
    localStorage.setItem('visitorCount', v);
    document.getElementById('visitorCount').innerText = v;

    render();
</script>
</body>
</html>
