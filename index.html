<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فتش سيارتك - سفير القوافي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #00ffc3; --bg: #0a0b10; --card: #11141d; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .wrapper { max-width: 500px; margin: 0 auto; padding: 20px; text-align: center; }
        
        /* الهوية البصرية */
        .profile-img { width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 10px; }
        
        /* البحث والجدول */
        .search-box { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; margin-bottom: 15px; outline: none; }
        .table-area { background: var(--card); border-radius: 10px; padding: 5px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 5px; text-align: center; border-bottom: 1px solid #1e293b; font-size: 0.8rem; }
        th { color: var(--accent); }

        /* لوحة التحكم الكلاسيكية */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; padding: 20px; box-sizing: border-box; }
        .admin-box { background: var(--card); border-radius: 10px; padding: 20px; max-width: 400px; margin: 20px auto; }
        input, textarea { width: 100%; background: #1e293b; border: 1px solid #334155; color: white; padding: 10px; border-radius: 5px; margin-bottom: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background: var(--accent); color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        /* زر فتح اللوحة */
        .admin-btn { position: fixed; top: 15px; left: 15px; color: var(--accent); font-size: 22px; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

    <div class="admin-btn" onclick="openAdmin()"><i class="fas fa-bars"></i></div>

    <div class="wrapper">
        <img src="https://i.ibb.co/VWVvX9Y/1000027027.jpg" class="profile-img">
        <h2>فتش سيارتك</h2>
        <p>بإشراف: سفير القوافي</p>
        
        <input type="text" class="search-box" id="sInp" placeholder="ابحث برقم الشاسي..." onkeyup="search()">

        <div class="table-area">
            <table>
                <thead>
                    <tr>
                        <th>السيارة</th>
                        <th>الشاسي</th>
                        <th>تواصل</th>
                    </tr>
                </thead>
                <tbody id="tBody"></tbody>
            </table>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-box">
            <h3 style="display:flex; justify-content:space-between;">لوحة الإدارة <span onclick="closeAdmin()" style="cursor:pointer; color:red;">×</span></h3>
            <textarea id="bulk" rows="4" placeholder="أدخل البيانات هنا..."></textarea>
            <input type="text" id="phone" placeholder="رقم التواصل">
            <button class="btn" onclick="save()">حفظ البيانات</button>
        </div>
    </div>

<script>
    let db = JSON.parse(localStorage.getItem('chassisDB')) || [];

    function render() {
        document.getElementById('tBody').innerHTML = db.map(item => `
            <tr>
                <td>${item.car}</td>
                <td style="color:#00ffc3;">${item.chassis}</td>
                <td><a href="https://wa.me/${item.phone}" style="color:#25d366;"><i class="fab fa-whatsapp"></i></a></td>
            </tr>
        `).join('');
    }

    window.openAdmin = function() {
        if(prompt("كلمة السر:") === "3344") document.getElementById('admin-panel').style.display='block';
    };
    
    window.closeAdmin = function() { document.getElementById('admin-panel').style.display='none'; };

    function search() {
        let v = document.getElementById('sInp').value.toLowerCase();
        let rs = document.querySelectorAll('#tBody tr');
        rs.forEach(r => r.style.display = r.innerText.toLowerCase().includes(v) ? '' : 'none');
    }

    render();
</script>
    <div id="new-code-payload" style="display:none;">
    </div>

<script>
(function() {
    const payload = document.getElementById('new-code-payload');
    
    // فحص إذا كان هناك كود جديد بداخل الـ Payload
    if (payload && payload.innerHTML.trim() !== "") {
        // تخزين النسخة الجديدة في ذاكرة المتصفح
        localStorage.setItem('site_core_update', payload.innerHTML);
        // إعادة تحميل الصفحة لتفعيل التحديث
        location.reload();
    }

    // استرجاع النسخة المحدثة وتطبيقها عند فتح الموقع
    window.addEventListener('load', function() {
        const savedUpdate = localStorage.getItem('site_core_update');
        if (savedUpdate) {
            document.body.innerHTML = savedUpdate;
        }
    });
})();
</script>

</body>
</html>
