<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة السودان الذكية</title>
    <style>
        :root {
            --bg-dark: #1a1f3c; /* الكحلي العميق من الصورة */
            --bg-light: #f4f7fd; /* الأبيض السحابي */
            --accent-orange: #ff5f40; /* البرتقالي للأزرار */
            --text-main: #2d3436;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            color: var(--text-main);
        }

        /* الهيدر المنحني الاحترافي */
        .header {
            background-color: var(--bg-dark);
            color: white;
            padding: 40px 20px 80px;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            text-align: center;
            position: relative;
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 30px; /* زوايا دائرية ناعمة */
            border: 4px solid rgba(255,255,255,0.2);
            object-fit: cover;
        }

        /* لوحة التحكم بأسلوب Modychat */
        .container {
            max-width: 500px;
            margin: -50px auto 20px;
            padding: 0 15px;
        }

        .search-card {
            background: white;
            padding: 25px;
            border-radius: 35px;
            box-shadow: var(--card-shadow);
            margin-bottom: 25px;
        }

        .search-input {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: #f0f2f8;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            color: var(--bg-dark);
        }

        /* الجدول الأنيق */
        .table-section {
            background: white;
            border-radius: 35px;
            padding: 20px;
            box-shadow: var(--card-shadow);
        }

        .car-row {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            transition: 0.3s;
        }

        .car-icon {
            width: 50px;
            height: 50px;
            background: #e8ebf5;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 15px;
            font-size: 20px;
        }

        .car-details { flex-grow: 1; }
        .car-name { font-weight: bold; font-size: 16px; color: var(--bg-dark); }
        .car-id { color: var(--accent-orange); font-family: monospace; font-weight: bold; }

        /* أزرار الإدارة والأكشن */
        .btn-main {
            background: var(--accent-orange);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(255, 95, 64, 0.3);
        }

        #adminPanel {
            display: none;
            background: var(--bg-dark);
            color: white;
            padding: 25px;
            border-radius: 35px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            border-radius: 15px;
            padding: 15px;
            border: none;
            margin-top: 10px;
            box-sizing: border-box;
        }

        .footer {
            text-align: center;
            padding: 40px;
            color: #95a5a6;
            font-size: 13px;
        }

        .admin-trigger {
            position: absolute;
            top: 20px;
            left: 20px;
            opacity: 0.3;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="admin-trigger" onclick="openAdmin()">⚙️</div>
    <img src="1000026303.jpg" class="profile-img" alt="البروفايل">
    <h2 style="margin: 15px 0 5px;">سفير القوافي</h2>
    <p style="margin: 0; opacity: 0.8;">منصة الاستعلام الذكية - السودان</p>
</div>

<div class="container">
    <div id="adminPanel">
        <h3>📥 إضافة جماعية ذكية</h3>
        <p style="font-size: 12px; opacity: 0.7;">ألصق نص الواتساب وسنقوم بفلترته تلقائياً</p>
        <textarea id="bulkInput" placeholder="اكسنت 123456..."></textarea>
        <button class="btn-main" onclick="addBulkCars()">تحديث البيانات الآن</button>
    </div>

    <div class="search-card">
        <input type="text" id="search" class="search-input" oninput="doSearch()" placeholder="🔍 ابحث عن شاسيه أو سيارة...">
    </div>

    <div class="table-section">
        <h3 style="margin-right: 15px; color: var(--bg-dark);">📊 آخر 10 إضافات</h3>
        <div id="carsList">
            </div>
        <button id="moreBtn" onclick="toggleView()" style="background:none; border:none; color:var(--accent-orange); font-weight:bold; width:100%; padding:15px; cursor:pointer;">المزيد لرؤية باقي السيارات...</button>
    </div>
</div>

<div class="footer">
    <b>2026 © جميع الحقوق محفوظة لمنصة السودان</b><br>
    بإشراف وتطوير: سفير القوافي
</div>

<script>
    let cars = JSON.parse(localStorage.getItem('cars')) || [];
    let showFull = false;

    // وظيفة الإضافة الجماعية الذكية
    function addBulkCars() {
        const input = document.getElementById('bulkInput').value;
        if(!input.trim()) return;

        const lines = input.split('\n');
        let count = 0;
        lines.forEach(line => {
            const matchId = line.match(/\d+/);
            if(matchId) {
                const id = matchId[0];
                let name = line.replace(id, '').replace(/[0-9]|/g, '').replace(/[،,-]/g, '').trim();
                if(!name) name = "سيارة غير مسمى";
                if(!cars.some(c => c.id === id)) {
                    cars.unshift({name, id});
                    count++;
                }
            }
        });
        localStorage.setItem('cars', JSON.stringify(cars));
        render();
        document.getElementById('bulkInput').value = "";
        alert("تمت إضافة " + count + " سيارة");
    }

    // وظيفة العرض المنسقة
    function render(data = cars) {
        const list = document.getElementById('carsList');
        list.innerHTML = "";
        const displayData = (data === cars && !showFull) ? data.slice(0, 10) : data;

        displayData.forEach(c => {
            list.innerHTML += `
                <div class="car-row">
                    <div class="car-icon">🚗</div>
                    <div class="car-details">
                        <div class="car-name">${c.name}</div>
                        <div class="car-id">ID: ${c.id}</div>
                    </div>
                    <a href="https://wa.me/249900000000" style="text-decoration:none; font-size:22px;">💬</a>
                </div>`;
        });
    }

    function doSearch() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = cars.filter(c => c.id.includes(q) || c.name.toLowerCase().includes(q));
        render(filtered);
    }

    function toggleView() {
        showFull = !showFull;
        render();
        document.getElementById('moreBtn').innerText = showFull ? "إظهار أقل" : "المزيد لرؤية باقي السيارات...";
    }

    function openAdmin() {
        if(prompt("كلمة السر") === "3344") document.getElementById('adminPanel').style.display = 'block';
    }

    render();
</script>
</body>
</html>
