<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة السودان الذكية</title>
    <style>
        :root {
            --bg-dark: #1a1f3c; 
            --bg-light: #f4f7fd; 
            --accent-orange: #ff5f40; 
            --text-main: #2d3436;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            color: var(--text-main);
        }

        /* تعديل ارتفاع الهيدر لعدم تغطية البحث */
        .header {
            background-color: var(--bg-dark);
            color: white;
            padding: 30px 20px 60px; /* تقليل الارتفاع السفلي */
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            text-align: center;
            position: relative;
        }

        .profile-img {
            width: 85px;
            height: 85px;
            border-radius: 25px;
            border: 3px solid rgba(255,255,255,0.2);
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .container {
            max-width: 500px;
            margin: -35px auto 20px; /* رفع المحتوى ليتداخل مع الهيدر بشكل أنيق */
            padding: 0 15px;
            position: relative;
            z-index: 10;
        }

        .search-card {
            background: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: var(--card-shadow);
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 18px;
            border: none;
            background: #f0f2f8;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        .table-section {
            background: white;
            border-radius: 30px;
            padding: 15px;
            box-shadow: var(--card-shadow);
        }

        .car-row {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #f2f2f2;
        }

        .car-icon {
            width: 45px;
            height: 45px;
            background: #eef1f9;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 12px;
            font-size: 18px;
        }

        .car-details { flex-grow: 1; }
        .car-name { font-weight: bold; font-size: 15px; color: var(--bg-dark); }
        .car-id { color: var(--accent-orange); font-family: monospace; font-size: 13px; font-weight: bold; }

        .btn-main {
            background: var(--accent-orange);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        /* لوحة الإدارة المحسنة */
        #adminPanel {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 25px;
            margin-bottom: 20px;
            border: 2px solid var(--bg-dark);
        }

        .admin-input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .footer { text-align: center; padding: 30px; color: #999; font-size: 12px; }
        .admin-trigger { position: absolute; top: 15px; left: 15px; opacity: 0.3; cursor: pointer; color: white; }
    </style>
</head>
<body>

<div class="header">
    <div class="admin-trigger" onclick="openAdmin()">⚙️</div>
    <img src="1000026303.jpg" class="profile-img" alt="سفير القوافي">
    <h2 style="margin: 10px 0 5px; font-size: 20px;">سفير القوافي</h2>
    <p style="margin: 0; font-size: 13px; opacity: 0.8;">منصة الاستعلام الذكية - السودان</p>
</div>

<div class="container">
    <div id="adminPanel">
        <h4 style="margin-top:0;">🔧 لوحة التحكم</h4>
        <label style="font-size:12px;">رقم التواصل لهذه المجموعة (اختياري):</label>
        <input type="text" id="customPhone" class="admin-input" placeholder="مثال: 249123456789">
        
        <label style="font-size:12px;">ألصق قائمة السيارات هنا:</label>
        <textarea id="bulkInput" class="admin-input" style="height:100px;" placeholder="اكسنت 123456..."></textarea>
        
        <button class="btn-main" onclick="addBulkCars()">🚀 نشر المجموعة الجديدة</button>
        <button onclick="clearData()" style="width:100%; background:none; border:none; color:red; margin-top:5px; cursor:pointer; font-size:11px;">🗑 مسح كل البيانات</button>
    </div>

    <div class="search-card">
        <input type="text" id="search" class="search-input" oninput="doSearch()" placeholder="🔍 ابحث عن شاسيه أو سيارة...">
    </div>

    <div class="table-section">
        <h3 style="margin-right: 10px; font-size: 16px; color: var(--bg-dark);">📊 آخر التحديثات</h3>
        <div id="carsList"></div>
        <button id="moreBtn" onclick="toggleView()" style="background:none; border:none; color:var(--accent-orange); font-weight:bold; width:100%; padding:10px; cursor:pointer; font-size:13px;">عرض المزيد...</button>
    </div>
</div>

<div class="footer">
    <b>2026 © جميع الحقوق محفوظة</b><br>تطوير: سفير القوافي
</div>

<script>
    let cars = JSON.parse(localStorage.getItem('cars')) || [];
    let showFull = false;
    const defaultPhone = "249129642174";

    function addBulkCars() {
        const input = document.getElementById('bulkInput').value;
        const groupPhone = document.getElementById('customPhone').value.trim() || defaultPhone;
        
        if(!input.trim()) return;

        const lines = input.split('\n');
        let count = 0;
        lines.forEach(line => {
            const matchId = line.match(/\d+/);
            if(matchId) {
                const id = matchId[0];
                let name = line.replace(id, '').replace(/[0-9]|/g, '').replace(/[،,-]/g, '').trim();
                if(!name) name = "سيارة غير مسمى";
                
                if(!cars.some(c => c.id === id)) {
                    cars.unshift({name, id, phone: groupPhone}); // حفظ الرقم مع كل سيارة
                    count++;
                }
            }
        });
        localStorage.setItem('cars', JSON.stringify(cars));
        render();
        document.getElementById('bulkInput').value = "";
        document.getElementById('customPhone').value = "";
        alert("تمت إضافة " + count + " سيارة برقم التواصل المذكور.");
    }

    function render(data = cars) {
        const list = document.getElementById('carsList');
        list.innerHTML = "";
        const displayData = (data === cars && !showFull) ? data.slice(0, 10) : data;

        displayData.forEach(c => {
            const contactPhone = c.phone || defaultPhone; // استخدام المسجل أو الأساسي
            list.innerHTML += `
                <div class="car-row">
                    <div class="car-icon">🚗</div>
                    <div class="car-details">
                        <div class="car-name">${c.name}</div>
                        <div class="car-id">ID: ${c.id}</div>
                    </div>
                    <a href="https://wa.me/${contactPhone}" target="_blank" style="text-decoration:none; font-size:22px;">💬</a>
                </div>`;
        });
    }

    function doSearch() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = cars.filter(c => c.id.includes(q) || c.name.toLowerCase().includes(q));
        render(filtered);
    }

    function toggleView() {
        showFull = !showFull;
        render();
        document.getElementById('moreBtn').innerText = showFull ? "إظهار أقل" : "عرض المزيد...";
    }

    function openAdmin() {
        if(prompt("كلمة سر الإدارة:") === "3344") {
            const panel = document.getElementById('adminPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }
    }

    function clearData() {
        if(confirm("حذف كل السيارات؟")) {
            cars = [];
            localStorage.removeItem('cars');
            render();
        }
    }

    render();
</script>
</body>
</html>
