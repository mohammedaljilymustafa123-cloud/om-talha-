<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة مفقودات السودان | سفير القوافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #1a3a5a; --sky: #5dade2; --bg: #f0f4f8; --white: #fff; --green: #28a745; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; text-align: center; }
        header { background: var(--navy); color: white; padding: 15px; font-weight: bold; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: var(--white); padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .manager-card { border-right: 6px solid var(--navy); text-align: right; display: flex; align-items: center; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--sky); margin-left: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; text-align: center; font-size: 16px; }
        .btn { background: var(--navy); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .congrats-banner { background: var(--green); color: white; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; font-size: 14px; }
        .car-list-title { color: var(--navy); font-weight: bold; margin: 20px 0 10px; display: block; }
        .car-item { background: white; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid var(--sky); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .chassis-box { background: #e3f2fd; color: var(--navy); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--sky); font-family: monospace; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<header>منصة السيارات المفقودة - السودان</header>

<div class="container">
    <div class="card manager-card">
        <img src="1000026303.jpg" alt="المدير" class="avatar">
        <div>

            <small>تسليم بدون استغلال</small>
        </div>

        <input type="text" id="searchInput" placeholder="أدخل رقم الشاسي للبحث..." onkeyup="filterCars()">
        <p style="font-size: 11px; color: #888;">(البحث يعمل تلقائياً بمجرد الكتابة)</p>

    function displayCars(data) {
        const container = document.getElementById('carContainer');
        container.innerHTML = "";
        data.forEach(car => {
            container.innerHTML += `
                <div class="car-item">
                    <span style="font-weight:bold;">${car.name}</span>

            `;

    }

    function filterCars() {
        const val = document.getElementById('searchInput').value.trim();
        const filtered = allCars.filter(c => c.id.includes(val) || c.name.includes(val));
        displayCars(filtered);
    }
