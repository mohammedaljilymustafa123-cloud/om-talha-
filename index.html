<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة سفير القوافي - الإدارة الشاملة</title>
    <style id="system-base-style">
        :root { --gold: #d4af37; --black: #000814; --neon: #00f2ff; --red: #ff4d4d; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f4f4; }
        header { background: var(--black); color: var(--gold); padding: 40px; text-align: center; border-bottom: 4px solid var(--gold); position: relative; }
        .admin-trigger { position: absolute; top: 10px; left: 10px; background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 10px; cursor: pointer; border-radius: 4px; font-size: 12px; }
        
        /* بوابة الدخول */
        #admin-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000814; display: none; align-items: center; justify-content: center; z-index: 9999; }
        .neon-box { border: 2px solid var(--neon); padding: 40px; border-radius: 20px; box-shadow: 0 0 20px var(--neon); background: #001219; text-align: center; width: 300px; }
        
        /* لوحة التحكم الاحترافية */
        #admin-dashboard { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; color: #fff; display: none; overflow-y: auto; z-index: 10000; padding: 20px; }
        .dashboard-container { max-width: 1100px; margin: auto; background: #111; padding: 25px; border-radius: 15px; border: 1px solid #333; position: relative; }
        .master-editor { width: 100%; height: 450px; background: #000; color: #0f0; border: 1px solid var(--neon); padding: 15px; font-family: 'Consolas', monospace; font-size: 14px; margin-top: 10px; border-radius: 8px; resize: vertical; }
        .btn-save { width: 100%; padding: 15px; background: var(--gold); border: none; color: #000; font-weight: bold; font-size: 18px; cursor: pointer; border-radius: 8px; margin-top: 15px; transition: 0.3s; }
        .btn-save:hover { background: #fff; box-shadow: 0 0 15px var(--gold); }
        .close-btn { position: absolute; top: -15px; right: -15px; background: var(--red); color: white; border: 2px solid #fff; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 24px; display: flex; align-items: center; justify-content: center; }
        
        /* تنسيق الجدول */
        .content-area { width: 95%; margin: 30px auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th { background: var(--gold); color: #000; padding: 15px; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div id="dynamic-app-container">
    <header>
        <button class="admin-trigger" onclick="openGate()">لوحة التحكم</button>
        <h1>منصة البحث عن السيارات المفقودة</h1>
        <p>إدارة سفير القوافي - ود أمطلحة</p>
    </header>

    <div class="content-area">
        <table id="carsTable">
            <thead><tr><th>م</th><th>رقم الشاسي</th><th>الموديل</th><th>اللوحة</th></tr></thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<div id="admin-gate">
    <div class="neon-box">
        <h3 style="color: var(--neon);">دخول المسؤول</h3>
        <input type="password" id="passCode" placeholder="الرمز" autocomplete="new-password" style="width: 100%; padding: 12px; text-align: center; border-radius: 5px; border: none; font-size: 20px;">
        <button onclick="checkAccess()" style="width: 100%; margin-top: 15px; padding: 10px; background: var(--gold); border: none; cursor: pointer; font-weight: bold;">دخول</button>
        <button onclick="closeGate()" style="width: 100%; margin-top: 5px; background: none; color: #888; border: none; cursor: pointer;">إلغاء</button>
    </div>
</div>

<div id="admin-dashboard">
    <div class="dashboard-container">
        <button class="close-btn" onclick="closeDashboard()">×</button>
        <h2 style="color: var(--gold);">المحرر البرمجي الشامل (Master Console)</h2>
        <p style="color: #888; font-size: 14px;">ضع هنا أكواد HTML, CSS, JavaScript لتعديل النظام بالكامل دون لمس ملف index.html</p>
        
        <textarea id="masterEditor" class="master-editor" placeholder=""></textarea>
        
        <button onclick="saveAndPropagate()" class="btn-save">حفظ وتحديث بنية النظام فوراً</button>
        <p style="text-align: center; color: #444; font-size: 12px; margin-top: 10px;">النظام يحفظ التعديلات في ذاكرة المتصفح الدائمة</p>
    </div>
</div>

<script>
    // 1. نظام الذاكرة الدائمة
    const STORAGE_KEY = 'safir_master_system_code';

    // 2. وظيفة الحقن العملاق (بنية النظام)
    function saveAndPropagate() {
        const fullCode = document.getElementById('masterEditor').value;
        localStorage.setItem(STORAGE_KEY, fullCode);
        applySystemChanges(fullCode);
        alert("✅ تم تحديث بنية النظام وحفظها بنجاح!");
    }

    function applySystemChanges(code) {
        // تنظيف الحقن السابق
        const oldInjections = document.querySelectorAll('.injected-content');
        oldInjections.forEach(el => el.remove());

        // إنشاء حاوية للحقن الجديد
        const wrapper = document.createElement('div');
        wrapper.className = 'injected-content';
        wrapper.innerHTML = code;
        
        // تنفيذ السكربتات يدوياً لأن innerHTML لا يشغل الـ <script> تلقائياً
        document.body.appendChild(wrapper);
        const scripts = wrapper.querySelectorAll('script');
        scripts.forEach(oldScript => {
            const newScript = document.createElement('script');
            Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
            newScript.appendChild(document.createTextNode(oldScript.innerHTML));
            oldScript.parentNode.replaceChild(newScript, oldScript);
        });
    }

    // 3. إدارة الوصول (3366)
    function openGate() {
        document.getElementById('passCode').value = ""; // مسح الخانة نهائياً
        document.getElementById('admin-gate').style.display = 'flex';
    }
    function closeGate() { document.getElementById('admin-gate').style.display = 'none'; }
    function checkAccess() {
        if(document.getElementById('passCode').value === "3366") {
            closeGate();
            document.getElementById('admin-dashboard').style.display = 'block';
        } else {
            alert("رمز الدخول خاطئ!");
            document.getElementById('passCode').value = "";
        }
    }
    function closeDashboard() { document.getElementById('admin-dashboard').style.display = 'none'; }

    // 4. تحميل النظام عند البدء (الترميم التلقائي)
    window.onload = function() {
        const savedCode = localStorage.getItem(STORAGE_KEY);
        if(savedCode) {
            document.getElementById('masterEditor').value = savedCode;
            applySystemChanges(savedCode);
        }
    };
</script>

</body>
</html>
