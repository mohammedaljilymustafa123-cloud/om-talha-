<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة سفير القوافي - الإصدار الذكي</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style id="dynamicStyles">
        :root {
            --dark-navy: #0a192f;
            --orange-main: #f39c12;
            --light-bg: #050505; /* خلفية داكنة لتبرز الإضاءة */
            --white: #ffffff;
        }

        /* تأثير إضاءة الحواف (Edge Lighting) */
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--light-bg);
            /* إطار الحواف المضيء */
            border: 4px solid var(--orange-main);
            box-sizing: border-box;
            box-shadow: 
                inset 0 0 20px #ff4500,
                0 0 30px #ff8c00;
            animation: edgePulse 3s infinite alternate;
            border-radius: 20px;
        }

        @keyframes edgePulse {
            from { box-shadow: inset 0 0 15px #ff4500, 0 0 25px #ff8c00; }
            to { box-shadow: inset 0 0 30px #ff4500, 0 0 50px #ff8c00; }
        }

        /* الهوية البصرية */
        header {
            background: var(--dark-navy);
            color: var(--white);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--orange-main);
            margin: 10px;
            border-radius: 15px;
        }

        .profile-img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid var(--orange-main);
        }

        /* محرك البحث */
        .search-area { padding: 20px; text-align: center; }
        #smartSearch {
            width: 85%;
            padding: 12px;
            border-radius: 25px;
            border: 2px solid var(--orange-main);
            background: #111;
            color: white;
            text-align: center;
        }

        /* الجدول المطور */
        .main-container { padding: 15px; }
        table {
            width: 100%;
            background: #1a1a1a;
            color: white;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
        }
        th { background: var(--dark-navy); color: var(--orange-main); padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #333; text-align: center; }
        .no-data { color: #ff4d4d; font-weight: bold; }

        /* لوحة الإدارة الذكية */
        #adminPanel {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 500px;
            background: white; padding: 20px;
            border-radius: 15px; z-index: 9999;
            color: #333;
            max-height: 80vh; overflow-y: auto;
        }

        .admin-trigger {
            position: fixed; bottom: 25px; left: 25px;
            background: var(--orange-main); color: white;
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 0 10px var(--orange-main);
        }

        .code-box {
            background: #222; color: #0f0;
            font-family: monospace; padding: 10px;
            width: 100%; margin-top: 10px; border-radius: 5px;
        }
    </style>
</head>
<body>

<header>
    <img src="https://via.placeholder.com/70" alt="سفير القوافي" class="profile-img">
    <h2>سفير القوافي</h2>
    <small id="vCount">زوار اليوم: 1,200</small>
</header>

<div class="search-area">
    <input type="text" id="smartSearch" placeholder="بحث ذكي (اسم، شاسيه، لوحة)..." onkeyup="runSearch()">
</div>

<div class="main-container">
    <table id="dataTable">
        <thead>
            <tr>
                <th>المركبة</th>
                <th>الشاسيه</th>
                <th>اللوحة</th>
                <th>💬</th>
            </tr>
        </thead>
        <tbody id="resBody"></tbody>
    </table>
</div>

<div class="admin-trigger" onclick="checkAdmin()">
    <i class="fas fa-microchip"></i>
</div>

<div id="adminPanel">
    <h3>⚙️ المحرك الذكي والإدارة</h3>
    <hr>
    
    <label><b>إضافة كود CSS مخصص (المحرك الذكي):</b></label>
    <textarea id="customCSS" class="code-box" rows="4" placeholder="أدخل كود ستايل هنا..."></textarea>
    <button onclick="applySmartCode()" style="background: #27ae60; color: white; width: 100%; padding: 10px; margin: 10px 0; border: none; border-radius: 5px;">تحديث تصميم الموقع فوراً</button>

    <hr>
    <label><b>إضافة بيانات جديدة:</b></label>
    <textarea id="dataInput" class="code-box" rows="3" placeholder="توسان 123456 خ789"></textarea>
    <button onclick="addData()" style="background: var(--dark-navy); color: white; width: 100%; padding: 10px; border: none; border-radius: 5px;">توزيع البيانات</button>
    
    <button onclick="closeAdmin()" style="background: #e74c3c; color: white; width: 100%; margin-top: 20px; border: none; padding: 5px;">إغلاق</button>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('myDB')) || [];

    // 1. تشغيل المحرك الذكي (Inject)
    function applySmartCode() {
        const css = document.getElementById('customCSS').value;
        const styleTag = document.getElementById('dynamicStyles');
        styleTag.innerHTML += css; // يضيف الكود الجديد للأكواد الحالية
        localStorage.setItem('userCustomCSS', css); // حفظ الكود ليعمل عند التحديث
        alert("تم تطبيق الكود بنجاح عبر المحرك الذكي!");
    }

    // استعادة الأكواد المخصصة عند فتح الصفحة
    window.onload = function() {
        const savedCSS = localStorage.getItem('userCustomCSS');
        if(savedCSS) document.getElementById('dynamicStyles').innerHTML += savedCSS;
        render();
    };

    function checkAdmin() {
        if(prompt("كلمة السر:") === "3344") document.getElementById('adminPanel').style.display = 'block';
    }

    function addData() {
        const lines = document.getElementById('dataInput').value.split('\n');
        lines.forEach(line => {
            if(line.trim()) {
                const p = line.split(' ');
                db.push({ type: p[0]||'نقص', chassis: p[1]||'نقص', plate: p[2]||'نقص' });
            }
        });
        localStorage.setItem('myDB', JSON.stringify(db));
        render();
        alert("تمت الإضافة!");
    }

    function render() {
        const body = document.getElementById('resBody');
        body.innerHTML = db.map(i => `
            <tr>
                <td>${i.type}</td>
                <td class="${i.chassis === 'نقص' ? 'no-data' : ''}">${i.chassis === 'نقص' ? 'لا يوجد' : i.chassis}</td>
                <td class="${i.plate === 'نقص' ? 'no-data' : ''}">${i.plate === 'نقص' ? 'لا يوجد' : i.plate}</td>
                <td><a href="https://wa.me/249xxxxxxx" style="color:#25d366"><i class="fab fa-whatsapp"></i></a></td>
            </tr>
        `).join('');
    }

    function runSearch() {
        const val = document.getElementById('smartSearch').value.toLowerCase();
        const filtered = db.filter(i => i.type.includes(val) || i.chassis.includes(val) || i.plate.includes(val));
        // عرض النتائج المفلترة فقط (تعديل بسيط على render)
        const body = document.getElementById('resBody');
        body.innerHTML = filtered.map(i => `
            <tr><td>${i.type}</td><td>${i.chassis}</td><td>${i.plate}</td><td>...</td></tr>
        `).join('');
    }

    function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }
</script>

</body>
</html>
